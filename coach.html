<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch-Side Coach Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force a clean mobile web-app container constraint */
        body { max-width: 480px; margin: 0 auto; }
    </style>
</head>
<body class="bg-zinc-900 font-sans text-gray-100 min-h-screen pb-10">

    <header class="bg-gradient-to-r from-red-800 to-red-950 p-4 shadow-xl border-b-4 border-amber-500 text-center sticky top-0 z-50">
        <h1 class="text-xl font-black tracking-widest text-amber-400">RCB ACADEMY</h1>
        <p class="text-xs uppercase tracking-wider text-gray-300 font-bold mt-0.5">Pitch-Side Coach Attendance</p>
    </header>

    <div class="p-4 space-y-6">
        
        <div class="bg-zinc-800 rounded-xl p-4 border border-zinc-700 shadow-md">
            <label class="block text-xs uppercase tracking-wider text-amber-400 font-black mb-2">
                1. Select Active Turf Session
            </label>
            <select id="session-select" onchange="handleSessionChange()" class="w-full bg-zinc-900 text-white border border-zinc-600 rounded-lg p-3 text-sm focus:outline-none focus:border-amber-500">
                <option value="">-- Choose Live Training Session --</option>
            </select>
        </div>

        <div id="roster-section" class="hidden space-y-3">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-sm uppercase tracking-wider font-bold text-gray-400">2. Player Attendance Check-in</h2>
                <span id="player-count" class="text-xs bg-zinc-700 px-2 py-0.5 rounded-full font-mono text-amber-400">0 loaded</span>
            </div>
            
            <div id="attendance-roster" class="space-y-3">
                </div>
        </div>

        <div id="empty-state" class="text-center py-12 px-4">
            <p class="text-gray-500 text-sm">Please select a scheduled training session above to load your active field squad roster.</p>
        </div>

    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let activeSessionId = null;

        // Initialize App data
        async function initMobileApp() {
            try {
                const res = await fetch(`${API_BASE}/sessions/`);
                const sessions = await res.json();
                const selectElement = document.getElementById("session-select");
                
                sessions.forEach(s => {
                    const formattedTime = new Date(s.start_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const option = document.createElement("option");
                    option.value = s.id;
                    option.textContent = `${s.turf_name} (${formattedTime})`;
                    selectElement.appendChild(option);
                });
            } catch (err) {
                alert("Error: Backend offline. Make sure your FastAPI terminal server is running.");
            }
        }

        // Triggered when a session is chosen
        async function handleSessionChange() {
            const selectElement = document.getElementById("session-select");
            activeSessionId = selectElement.value;

            if (!activeSessionId) {
                document.getElementById("roster-section").classList.add("hidden");
                document.getElementById("empty-state").classList.remove("hidden");
                return;
            }

            document.getElementById("roster-section").classList.remove("hidden");
            document.getElementById("empty-state").classList.add("hidden");
            await loadPlayerRoster();
        }

        // Fetch and draw the squad check-in buttons
        async function loadPlayerRoster() {
            const res = await fetch(`${API_BASE}/players/`);
            const players = await res.json();
            
            document.getElementById("player-count").textContent = `${players.length} Squad Members`;
            const rosterContainer = document.getElementById("attendance-roster");
            rosterContainer.innerHTML = "";

            players.forEach(player => {
                rosterContainer.innerHTML += `
                    <div class="bg-zinc-800 rounded-xl p-4 border border-zinc-700 shadow flex justify-between items-center transition duration-200" id="card-${player.id}">
                        <div>
                            <p class="font-bold text-white tracking-wide">${player.name}</p>
                            <p class="text-xs text-zinc-400 mt-0.5">Age: ${player.age} | ID: #${player.id}</p>
                        </div>
                        <button onclick="submitAttendance(${player.id})" id="btn-${player.id}" class="bg-gradient-to-r from-red-700 to-red-600 hover:from-red-600 hover:to-red-500 text-white font-black text-xs uppercase tracking-wider py-2.5 px-4 rounded-lg shadow-md border-b-2 border-red-900 active:transform active:scale-95 transition-all">
                            Mark Present
                        </button>
                    </div>
                `;
            });
        }

        // Send check-in scan record to FastAPI database
        async function submitAttendance(playerId) {
            if (!activeSessionId) return;

            const button = document.getElementById(`btn-${playerId}`);
            const card = document.getElementById(`card-${playerId}`);
            
            // Visual transition states to feel dynamic and instant
            button.disabled = true;
            button.innerText = "Saving...";

            try {
                const response = await fetch(`${API_BASE}/attendance/`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        player_id: playerId,
                        session_id: parseInt(activeSessionId),
                        attended: true
                    })
                });

                if (response.ok) {
                    // Turn card into green success confirmation state
                    button.className = "bg-emerald-600 text-white font-bold text-xs uppercase tracking-wider py-2 px-3 rounded-md shadow-inner cursor-not-allowed";
                    button.innerText = "Checked In \u2713";
                    card.classList.replace("border-zinc-700", "border-emerald-700");
                } else {
                    throw new Error("Failed validation");
                }
            } catch (err) {
                alert("Attendance sync failed.");
                button.disabled = false;
                button.innerText = "Mark Present";
            }
        }

        window.onload = initMobileApp;
    </script>
</body>
</html>
